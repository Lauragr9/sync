{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card p-4">
      <h3 class="mb-4">Log in</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-dark w-100">Log in</button>
      </form>
      <p class="text-center mt-3 small">No account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
  </div>
</div>

{% endblock %}
