{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card p-4">
      <h3 class="mb-4">Sign up</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
              <div class="form-text">{{ field.help_text }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-dark w-100">Create account</button>
      </form>
      <p class="text-center mt-3 small">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
  </div>
</div>

{% endblock %}
