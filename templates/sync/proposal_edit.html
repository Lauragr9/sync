{% extends 'base.html' %}
{% block content %}
  <h2>Edit proposal — {{ proposal.city }}, {{ proposal.country }}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-flex justify-content-between align-items-center mt-3">
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-dark">Save changes</button>
        <a href="{% url 'trip_detail' proposal.trip.slug %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
      <a href="{% url 'proposal_delete' proposal.id %}" class="btn btn-outline-danger btn-sm">Delete proposal</a>
    </div>
  </form>
{% endblock %}
