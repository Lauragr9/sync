{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <div style="font-size:2.5rem;margin-bottom:1rem;">🗑️</div>
      <h4 class="mb-1">Delete proposal?</h4>
      <p class="text-muted mb-4">
        <strong>{{ proposal.city }}, {{ proposal.country }}</strong> will be permanently removed along with all votes.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
          <button type="submit" class="btn btn-danger">Yes, delete</button>
          <a href="{% url 'trip_detail' proposal.trip.slug %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
